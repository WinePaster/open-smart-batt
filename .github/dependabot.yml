version: 2
updates:
  # 追蹤 GitHub Actions 版本更新（緩解第三方 action 釘在浮動 major tag 的供應鏈風險）
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  # Flutter/Dart (pub) updates are managed MANUALLY: even non-major plugin bumps
  # break `flutter analyze` / the Android build here, so Dependabot pub PRs are
  # pure noise. Re-enable deliberately if needed.
