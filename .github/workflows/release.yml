name: Release APK

# 兩種觸發：
#   A. 一鍵自動推進 — Actions → Run workflow → 選 bump(patch/minor/major/prerelease)
#   B. 明確版號     — 推 tag v*.*.*（例 git push origin v0.4.0）
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      bump:
        description: '版號推進方式'
        type: choice
        default: patch
        options: [patch, minor, major, prerelease]

permissions:
  contents: write   # 建立 tag / 發佈 Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # 不中斷進行中的發佈，避免 tag 競態

env:
  FLUTTER_VERSION: '3.44.4'
  APP_DIR: app_flutter

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # 需要完整 tag 歷史來算下一版

      - name: 計算版號 (versionName) 與 build number (versionCode)
        id: ver
        run: |
          set -e
          BUILD="${{ github.run_number }}"      # 單調遞增 → Android versionCode
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VER="${TAG#v}"
          else
            # base ONLY from stable tags (exclude -rc/-* prereleases) so prereleases
            # never out-sort or consume the next stable patch
            LATEST="$(git tag -l 'v*.*.*' | grep -vE -- '-' | sort -V | tail -n1)"
            LATEST="${LATEST:-v0.0.0}"
            BASE="${LATEST#v}"
            IFS='.' read -r MA MI PA <<< "$BASE"
            case "${{ github.event.inputs.bump }}" in
              major) MA=$((MA+1)); MI=0; PA=0; VER="$MA.$MI.$PA" ;;
              minor) MI=$((MI+1)); PA=0;        VER="$MA.$MI.$PA" ;;
              patch) PA=$((PA+1));              VER="$MA.$MI.$PA" ;;
              prerelease) PA=$((PA+1));         VER="$MA.$MI.$PA-rc.${BUILD}" ;;
            esac
            TAG="v${VER}"
          fi
          PRE=false; [[ "$VER" == *-* ]] && PRE=true
          echo "VERSION=$VER" >> "$GITHUB_OUTPUT"
          echo "TAG=$TAG"     >> "$GITHUB_OUTPUT"
          echo "BUILD=$BUILD" >> "$GITHUB_OUTPUT"
          echo "PRERELEASE=$PRE" >> "$GITHUB_OUTPUT"
          echo "→ versionName=$VER  versionCode=$BUILD  tag=$TAG  prerelease=$PRE"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: flutter pub get
        working-directory: ${{ env.APP_DIR }}
        run: flutter pub get

      - name: 編譯 release APK
        working-directory: ${{ env.APP_DIR }}
        run: |
          flutter build apk --release \
            --build-name="${{ steps.ver.outputs.VERSION }}" \
            --build-number="${{ steps.ver.outputs.BUILD }}"

      - name: 重新命名 APK
        run: |
          SRC="${APP_DIR}/build/app/outputs/flutter-apk/app-release.apk"
          OUT="open-rce-batt-${{ steps.ver.outputs.TAG }}-${{ steps.ver.outputs.BUILD }}.apk"
          cp "$SRC" "$OUT"
          sha256sum "$OUT" | tee "${OUT}.sha256"
          echo "APK=$OUT" >> "$GITHUB_ENV"

      - name: 發佈 GitHub Release（含 APK）
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: Open-RCE-Batt ${{ steps.ver.outputs.TAG }}
          prerelease: ${{ steps.ver.outputs.PRERELEASE }}
          generate_release_notes: true
          body: |
            社群自救版 · 非官方 · 非商業。
            ⚠️ 此 APK 目前為 **debug 簽章**（尚未設定正式簽章金鑰）；**請以下方 SHA256 為信任依據**，或自行從原始碼編譯後安裝。
            versionName `${{ steps.ver.outputs.VERSION }}` · versionCode `${{ steps.ver.outputs.BUILD }}`
          files: |
            ${{ env.APK }}
            ${{ env.APK }}.sha256

  # ---------------------------------------------------------------------------
  # iOS IPA → TestFlight (added by the iOS port; independent of build-release).
  #
  # GATED ON SIGNING SECRETS that are NOT in this repo. Without them the job
  # exits early (green no-op) so it never blocks an Android release. To enable,
  # the maintainer adds repo secrets (see docs/ios-port-plan.md G.1 / H.2):
  #   APPLE_TEAM_ID, IOS_P12_BASE64, IOS_P12_PASSWORD,
  #   IOS_MOBILEPROVISION_BASE64, ASC_KEY_ID, ASC_ISSUER_ID, ASC_API_KEY_BASE64
  # NONE of these are stored here — they live only in GitHub Actions secrets.
  # ---------------------------------------------------------------------------
  ios-ipa:
    name: iOS IPA (TestFlight)
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check signing prerequisites
        id: signing
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          READY=true
          if [ -z "$IOS_P12_BASE64" ] || [ -z "$IOS_MOBILEPROVISION_BASE64" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "::notice::iOS signing secrets not set — skipping IPA build & TestFlight upload."
            READY=false
          fi
          echo "ready=$READY" >> "$GITHUB_OUTPUT"

      - name: Derive numeric version (strip -rc.N for iOS)
        if: steps.signing.outputs.ready == 'true'
        id: ver
        run: |
          # CFBundleShortVersionString must be strictly numeric x.y.z. Strip any
          # prerelease suffix; CFBundleVersion stays the monotonic run_number.
          RAW="${GITHUB_REF_NAME#v}"
          NUMERIC="${RAW%%-*}"
          [ -z "$NUMERIC" ] && NUMERIC="0.0.0"
          echo "numeric=$NUMERIC" >> "$GITHUB_OUTPUT"
          echo "build=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Pin Xcode
        if: steps.signing.outputs.ready == 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable   # TODO(maintainer): pin to match Flutter 3.44.4

      - uses: subosito/flutter-action@v2
        if: steps.signing.outputs.ready == 'true'
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Import signing assets into a temporary keychain
        if: steps.signing.outputs.ready == 'true'
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
        run: |
          # Decode secrets to runner-only temp files (never committed).
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$IOS_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$IOS_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$IOS_MOBILEPROVISION_BASE64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/dist.mobileprovision"

      - name: Inject Team ID into ExportOptions.plist
        if: steps.signing.outputs.ready == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        working-directory: ${{ env.APP_DIR }}
        run: |
          # ExportOptions.plist ships with a placeholder so the real Team ID never
          # enters the public repo; inject it at build time only.
          /usr/bin/sed -i '' "s/__APPLE_TEAM_ID__/${APPLE_TEAM_ID}/" ios/ExportOptions.plist

      - name: flutter build ipa
        if: steps.signing.outputs.ready == 'true'
        working-directory: ${{ env.APP_DIR }}
        run: |
          flutter pub get
          flutter build ipa --release \
            --build-name="${{ steps.ver.outputs.numeric }}" \
            --build-number="${{ steps.ver.outputs.build }}" \
            --export-options-plist ios/ExportOptions.plist

      - name: Upload to TestFlight (App Store Connect API key)
        if: steps.signing.outputs.ready == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        working-directory: ${{ env.APP_DIR }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_BASE64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          IPA="$(find build/ios/ipa -name '*.ipa' | head -n1)"
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
